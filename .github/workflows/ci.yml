name: CI — Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke Test (CPU, amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-base-patch32-${{ hashFiles('requirements-backend.txt') }}
          restore-keys: hf-clip-vit-base-patch32-

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Run smoke test
        run: python scripts/smoke_test.py

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: aerospace-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: aerospace-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Only runs when secrets are available (not on PRs from forks)
  ingest-test:
    name: Ingest Test (1 source)
    needs: [smoke-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-base-patch32-${{ hashFiles('requirements-backend.txt') }}
          restore-keys: hf-clip-vit-base-patch32-

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Download test PDF
        run: python scripts/fetch_test_data.py --max 1

      - name: Run ingest (1 source)
        run: python -m app.ingest --recreate-collection
